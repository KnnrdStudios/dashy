name: Build MIDI Studio MSI

# Builds a Windows .msi installer for the MIDI Studio desktop app.
# Runs on every push to the feature branch and on manual dispatch.
# The resulting .msi is uploaded as a workflow artifact and (for tag pushes)
# attached to a GitHub Release.

on:
  push:
    branches:
      - "claude/midi-learning-desktop-app-ZlzUt"
    paths:
      - "midi-studio/**"
      - ".github/workflows/midi-studio-msi.yml"
  workflow_dispatch:
  release:
    types: [created]

jobs:
  build-msi:
    name: Build .msi on Windows
    runs-on: windows-latest
    defaults:
      run:
        working-directory: midi-studio
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install WiX Toolset 3 (required for electron-builder msi target)
        shell: pwsh
        run: |
          choco install wixtoolset --no-progress --yes
          echo "C:\Program Files (x86)\WiX Toolset v3.11\bin" >> $env:GITHUB_PATH

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build .msi installer
        env:
          # electron-builder wants this on CI
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run dist:msi

      - name: List build output
        shell: pwsh
        run: Get-ChildItem -Path dist -Recurse | Select-Object FullName, Length

      - name: Upload MSI as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: midi-studio-msi
          path: midi-studio/dist/*.msi
          if-no-files-found: error
          retention-days: 30

      - name: Attach MSI to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: midi-studio/dist/*.msi
